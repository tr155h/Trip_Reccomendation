<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PlanMyTrip - Login</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #4b79a1, #283e51);
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container {
      width: 100%;
      max-width: 420px;
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 18px;
      padding: 32px;
      box-shadow: 0 18px 60px rgba(0,0,0,0.28);
    }
    h1 {
      margin: 0;
      font-size: 2.2rem;
      letter-spacing: 1px;
    }
    .subtitle {
      margin: 8px 0 24px;
      opacity: 0.85;
    }
    .card h2 {
      margin-top: 0;
    }
    label {
      display: block;
      margin: 18px 0 8px;
      font-weight: 600;
    }
    input[type="text"],
    input[type="password"] {
      width: 100%;
      padding: 14px 16px;
      border: none;
      border-radius: 12px;
      font-size: 1rem;
    }
    button {
      width: 100%;
      margin-top: 18px;
      padding: 14px 16px;
      border: none;
      border-radius: 12px;
      font-size: 1rem;
      cursor: pointer;
    }
    button#signinButton {
      background: #ff8c42;
      color: #111;
    }
    button#signupButton {
      background: rgba(255,255,255,0.14);
      color: #fff;
    }
    p.hint, p.message {
      margin: 16px 0 0;
      font-size: 0.95rem;
      opacity: 0.9;
    }
    p.message {
      color: #ffe7e7;
    }
    a.link {
      color: #ffdd82;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>PlanMyTrip</h1>
    <p class="subtitle">Plan Smart. Travel Better.</p>

    <div class="card">
      <h2>Welcome!</h2>
      <p>Enter your username and password to continue.</p>

      <form id="loginForm" action="{{ url_for('login') }}" method="post">
        <label for="username">Enter your username</label>
        <input
          id="username"
          name="username"
          type="text"
          placeholder="yourname1234"
          required
          pattern=".*\d{4}$"
          title="Your username should end with 4 digits"
        />

        <label for="password">Password</label>
        <input
          id="password"
          name="password"
          type="password"
          placeholder="Enter your password"
          required
        />

        <button id="signinButton" type="submit">Sign In</button>
      </form>

         <p class="hint">Use a username ending with 4 digits, for example <strong>alex1234</strong>. Enter your password to sign in.</p>
      <button id="signupButton" type="button" onclick="window.location.href='signup.html'">Sign Up</button>

      {% if error %}
        <p id="message" class="message">{{ error }}</p>
      {% endif %}
      {% if success %}
        <p id="message" class="message">{{ success }}</p>
      {% endif %}
    </div>
  </div>

</body>
</html>
